version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    container_name: balancing_market_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    restart: always
    container_name: balancing_market_api
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["/app/start.sh"]

  eirgrid_api:
    build: .
    container_name: eirgrid_api_fetch
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "data_sources/eirgrid_api.py"]

  process_data:
    build: .
    container_name: process_data
    depends_on:
      - eirgrid_api
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "data_sources/process_data.py"]

  convert_to_tfrecord:
    build: .
    container_name: convert_to_tfrecord
    depends_on:
      - process_data
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "ml_models/utils/convert_to_tfrecord.py"]

  train_model:
    build: .
    container_name: train_model
    depends_on:
      - convert_to_tfrecord
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "ml_models/training/train_model.py"]

  inference:
    build: .
    container_name: inference
    depends_on:
      - train_model
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "ml_models/inference/predict.py"]

volumes:
  pg_data:
